version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: large_commerce_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres2005
      POSTGRES_DB: large_commerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: